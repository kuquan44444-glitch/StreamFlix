# Configuración de Nginx para StreamFlix
# Archivo: /etc/nginx/sites-available/streamflix

server {
    listen 80;
    server_name tu-dominio.com www.tu-dominio.com;
    
    # Redireccionar HTTP a HTTPS (descomenta cuando tengas SSL)
    # return 301 https://$server_name$request_uri;
    
    # Configuración de logs
    access_log /var/log/nginx/streamflix_access.log;
    error_log /var/log/nginx/streamflix_error.log;
    
    # Configuración de seguridad
    server_tokens off;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    
    # Configuración de uploads
    client_max_body_size 100M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    
    # Configuración de proxy
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # Configuración principal de la aplicación
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_redirect off;
        
        # Configuración para WebSockets (si se implementa en el futuro)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    # Archivos estáticos con cache agresivo
    location /static/ {
        alias /home/streamflix/streamflix/app/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        
        # Compresión
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types
            text/plain
            text/css
            text/xml
            text/javascript
            application/javascript
            application/xml+rss
            application/json;
    }
    
    # Videos con cache moderado
    location /static/uploads/videos/ {
        alias /home/streamflix/streamflix/app/static/uploads/videos/;
        expires 30d;
        add_header Cache-Control "public";
        
        # Configuración para streaming de video
        location ~* \.(mp4|webm|ogg)$ {
            add_header Accept-Ranges bytes;
            
            # Soporte para range requests (importante para video)
            if ($request_method = GET) {
                add_header Accept-Ranges bytes;
            }
        }
    }
    
    # Imágenes con cache moderado
    location /static/uploads/thumbnails/ {
        alias /home/streamflix/streamflix/app/static/uploads/thumbnails/;
        expires 7d;
        add_header Cache-Control "public";
        
        # Optimización para imágenes
        location ~* \.(jpg|jpeg|png|gif|webp)$ {
            add_header Vary Accept;
        }
    }
    
    # Favicon
    location = /favicon.ico {
        alias /home/streamflix/streamflix/app/static/favicon.ico;
        expires 1y;
        add_header Cache-Control "public, immutable";
        log_not_found off;
    }
    
    # Robots.txt
    location = /robots.txt {
        alias /home/streamflix/streamflix/app/static/robots.txt;
        expires 1d;
        log_not_found off;
    }
    
    # Bloquear acceso a archivos sensibles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Bloquear acceso directo a archivos Python
    location ~* \.(py|pyc|pyo)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

